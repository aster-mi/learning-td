<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- tower body gradient -->
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- top glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- base gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" opacity="0.35"/>

  <!-- tower base platform -->
  <rect x="18" y="50" width="28" height="5" rx="2.5" fill="#334155"/>

  <!-- tower body -->
  <path d="M22 50 L22 26 L20 26 L32 14 L44 26 L42 26 L42 50 Z" fill="url(#tg)"/>

  <!-- tower windows (3 rows) -->
  <rect x="27" y="42" width="10" height="6" rx="1" fill="#0f172a" opacity="0.6"/>
  <rect x="29" y="33" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>

  <!-- tower battlements -->
  <rect x="20" y="24" width="4" height="4" rx="0.5" fill="#6366f1"/>
  <rect x="26" y="24" width="4" height="4" rx="0.5" fill="#6366f1"/>
  <rect x="34" y="24" width="4" height="4" rx="0.5" fill="#6366f1"/>
  <rect x="40" y="24" width="4" height="4" rx="0.5" fill="#6366f1"/>

  <!-- glow behind star -->
  <circle cx="32" cy="12" r="10" fill="url(#glow)"/>

  <!-- question mark / knowledge star -->
  <g transform="translate(32, 10)">
    <!-- 6-point star burst -->
    <polygon points="0,-8 2,-3 7,-3 3,0 5,5 0,2 -5,5 -3,0 -7,-3 -2,-3" fill="#22d3ee"/>
    <!-- inner glow -->
    <circle r="3.5" fill="#fff" opacity="0.9"/>
    <!-- question mark -->
    <text x="0" y="1.8" text-anchor="middle" font-size="6" font-weight="900" font-family="Arial,sans-serif" fill="#3730a3">?</text>
  </g>

  <!-- small sparkles -->
  <circle cx="16" cy="18" r="1.2" fill="#22d3ee" opacity="0.7"/>
  <circle cx="48" cy="20" r="1" fill="#a78bfa" opacity="0.6"/>
  <circle cx="12" cy="38" r="0.8" fill="#818cf8" opacity="0.5"/>
  <circle cx="52" cy="36" r="1" fill="#22d3ee" opacity="0.5"/>
</svg>